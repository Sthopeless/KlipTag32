name: Publish Firmware

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:

  test-and-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Debug
        run: cat secrets.yaml

  build-firmware:
    uses: esphome/workflows/.github/workflows/build.yml@3c4e8446aa1029f1c346a482034b3ee1489077ca
    with:
      files: |
        kliptag32.yaml
      esphome-version: latest
      combined-name: kliptag32
      release-summary: ${{ github.event.release.body }}
      release-url: ${{ github.event.release.html_url }}
      release-version: ${{ github.event.release.tag_name }}

  upload-to-release:
    name: Upload to Release
    needs:
      - build-firmware
    uses: esphome/workflows/.github/workflows/upload-to-gh-release.yml@3c4e8446aa1029f1c346a482034b3ee1489077ca
    with:
      version: ${{ github.event.release.tag_name }}