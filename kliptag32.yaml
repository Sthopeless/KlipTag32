substitutions:
  device_name: kliptag32
  friendly_name: KlipTag32
  project_version: "1.0.0"
  spoolman_host: !secret spoolman_ip
  moonraker_host: !secret moonraker_ip
  spoolman_url_spool_path:  http://${spoolman_host}/api/v1/spool/
  moonraker_url_status:     http://${moonraker_host}/server/spoolman/status
  moonraker_url_set_spool:  http://${moonraker_host}/server/spoolman/spool_id
  moonraker_url_print_stats: http://${moonraker_host}/printer/objects/query?print_stats

packages:
  scale: !include kliptag32/packages/scale.yaml
  nfc:   !include kliptag32/packages/nfc.yaml
  ui:    !include kliptag32/packages/ui.yaml

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  area: !secret kliptag32_area
  comment: ${friendly_name} - ESPHome-based NFC spool reader and scale with Spoolman & Moonraker API integration.
  name_add_mac_suffix: true
  project:
    name: sthope.${device_name}
    version: ${project_version}
  includes:
    - kliptag32/kliptag32_ui.h
  on_boot:
    priority: -100
    then:
      - lambda: |-
          id(scale_raw).stop_poller();
          ESP_LOGI("scale", "HX711 poller stopped at boot (idle until SCALE page)");

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_LWIP_MAX_SOCKETS: "17"

logger:
  logs:
    sensor: WARN
    hx711: WARN
    rc522: ERROR
    rc522_spi: ERROR

api:
  encryption:
    key: !secret kliptag32_api_key

ota:
  - platform: esphome
    password: !secret kliptag32_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: ${device_name}
  on_connect:
    - delay: 10s
    - script.execute: refresh_backend_status
    - delay: 5s
    - script.execute: fetch_spools_list

captive_portal:

web_server:
  version: 3
  port: 80
  sorting_groups:
    - id: sorting_group_nfc_read
      name: "NFC Read"
      sorting_weight: 0
    - id: sorting_group_nfc_write
      name: "NFC Write"
      sorting_weight: 1
    - id: sorting_group_filament_data
      name: "Filament Data"
      sorting_weight: 2
    - id: sorting_group_status
      name: "Status"
      sorting_weight: 3
    - id: sorting_group_scale
      name: "Scale"
      sorting_weight: 4
    - id: sorting_group_diagnostic
      name: "Diagnostic"
      sorting_weight: 10

external_components:
  - source:
      type: local
      path: ./kliptag32/components
    components: [rc522, rc522_spi]

http_request:
  useragent: kliptag32-esphome
  timeout: 10s
  verify_ssl: false

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
  frequency: 100kHz

globals:
  - id: current_spool_id
    type: int
    restore_value: true
    initial_value: "0"
  - id: moonraker_connected
    type: bool
    restore_value: false
    initial_value: "false"
  - id: spoolman_connected
    type: bool
    restore_value: false
    initial_value: "false"
  - id: current_filament_id
    type: int
    restore_value: false
    initial_value: "0"
  - id: pending_spool_id
    type: int
    restore_value: false
    initial_value: "0"
  - id: printer_state
    type: std::string
    restore_value: false
    initial_value: '"unknown"'

script:
  - id: fetch_spools_list
    mode: restart
    then:
      - http_request.get:
          url: ${spoolman_url_spool_path}
          capture_response: true
          max_response_buffer_size: 16384 # 32768
          on_response:
            - lambda: |-
                if (response->status_code != 200) {
                  ESP_LOGW("spoolman", "Spools list HTTP %d", response->status_code);
                  return;
                }

                JsonDocument filter;
                filter[0]["id"] = true;
                filter[0]["filament"]["name"] = true;
                filter[0]["filament"]["material"] = true;
                filter[0]["initial_weight"] = true;
                filter[0]["remaining_weight"] = true;

                JsonDocument doc;
                auto err = deserializeJson(doc, body, DeserializationOption::Filter(filter));
                if (err) {
                  ESP_LOGW("spoolman", "Spools list JSON parse failed: %s", err.c_str());
                  return;
                }
                if (!doc.is<JsonArray>()) {
                  ESP_LOGW("spoolman", "Spools list JSON has unexpected shape");
                  return;
                }

                JsonArray arr = doc.as<JsonArray>();
                int max_id = 1;
                for (JsonObject spool : arr) {
                  int sid = spool["id"] | 0;
                  if (sid > max_id) max_id = sid;
                }
                int width = 1;
                for (int n = max_id; n >= 10; n /= 10) width++;
                if (width < 2) width = 2;
                id(spool_id_width) = width;

                std::vector<std::string> options;
                options.reserve(arr.size());
                char line[96];
                for (JsonObject spool : arr) {
                  int sid = spool["id"] | 0;
                  if (sid <= 0) continue;
                  const char *name = spool["filament"]["name"] | "Unknown";
                  const char *material = spool["filament"]["material"] | "?";
                  float initial = spool["initial_weight"] | 0.0f;
                  float remaining = spool["remaining_weight"] | 0.0f;
                  int pct = (initial > 0.0f) ? (int) ((remaining / initial) * 100.0f + 0.5f) : 0;
                  snprintf(line, sizeof(line), "%0*d | %s | %s | %d%%", width, sid, material, name, pct);
                  options.emplace_back(line);
                }

                if (options.empty()) {
                  ESP_LOGW("spoolman", "No spools found from /api/v1/spool/");
                  return;
                }

                static std::vector<std::string> backing_a, backing_b;
                static std::vector<std::string> *active_backing = nullptr;

                std::string old_spool_sel = id(spool_select).has_state()
                                              ? id(spool_select).current_option().str()
                                              : std::string();
                std::string old_spoolman_sel = id(spoolman_spools_select).has_state()
                                                 ? id(spoolman_spools_select).current_option().str()
                                                 : std::string();

                const auto &cur_opts = id(spool_select).traits.get_options();
                bool changed = (cur_opts.size() != options.size());
                if (!changed) {
                  for (size_t i = 0; i < options.size(); i++) {
                    if (strcmp(cur_opts[i], options[i].c_str()) != 0) { changed = true; break; }
                  }
                }
                if (changed) {
                  auto &next = (active_backing == &backing_a) ? backing_b : backing_a;
                  next = std::move(options);
                  esphome::FixedVector<const char *> fv;
                  fv.init(next.size());
                  for (auto &s : next) fv.push_back(s.c_str());
                  id(spool_select).traits.set_options(fv);
                  id(spoolman_spools_select).traits.set_options(fv);
                  active_backing = &next;
                  ESP_LOGI("spoolman", "Loaded %d spool options", (int) next.size());
                }

                auto *backing = active_backing;
                if (backing && !backing->empty()) {
                  if (old_spool_sel.empty() || !id(spool_select).has_option(old_spool_sel)) {
                    id(spool_select).publish_state(backing->front());
                  }
                  if (old_spoolman_sel.empty() || !id(spoolman_spools_select).has_option(old_spoolman_sel)) {
                    id(spoolman_spools_select).publish_state(backing->front());
                  }
                }

  - id: refresh_backend_status
    mode: restart
    then:
      - http_request.get:
          url: ${moonraker_url_status}
          capture_response: true
          on_response:
            - lambda: |-
                  if (response->status_code != 200) {
                    id(moonraker_connected) = false;
                    id(moonraker_status_text).publish_state("offline");
                    ESP_LOGW("backend", "Moonraker status HTTP %d", response->status_code);
                    return;
                  }
                  bool parsed = json::parse_json(body, [](JsonObject root) -> bool {
                    bool connected = root["result"]["spoolman_connected"] | false;
                    int spool_id = root["result"]["spool_id"] | 0;
                    id(moonraker_connected) = connected;
                    id(current_spool_id) = spool_id;
                    id(moonraker_status_text).publish_state(connected ? "connected" : "offline");
                    return true;
                  });
                  if (!parsed) {
                    id(moonraker_connected) = false;
                    id(moonraker_status_text).publish_state("json_error");
                    ESP_LOGW("backend", "Moonraker JSON parse failed");
                    return;
                  }
                  id(fetch_spool_by_id).execute();
                  if (id(spool_select).traits.get_options().size() <= 1) {
                    id(fetch_spools_list).execute();
                  }

  - id: fetch_spool_by_id
    mode: restart
    then:
      - if:
          condition:
            lambda: "return id(current_spool_id) > 0;"
          then:
            - http_request.get:
                url: !lambda |-
                  return "${spoolman_url_spool_path}" + to_string(id(current_spool_id));
                capture_response: true
                on_response:
                  - lambda: |-
                        if (response->status_code != 200) {
                          id(spoolman_connected) = false;
                          id(spoolman_status_text).publish_state("offline");
                          ESP_LOGW("backend", "Spoolman spool fetch HTTP %d", response->status_code);
                          return;
                        }
                        bool parsed = json::parse_json(body, [](JsonObject root) -> bool {
                          std::string name = root["filament"]["name"] | "Unknown";
                          const char *material = root["filament"]["material"] | "?";
                          int fid = root["filament"]["id"] | 0;
                          id(current_filament_id) = fid;
                          float price = root["price"].is<float>() || root["price"].is<int>()
                                        ? root["price"].as<float>()
                                        : (root["filament"]["price"] | 0.0f);
                          float initial = root["initial_weight"] | 0.0f;
                          float remaining = root["remaining_weight"] | 0.0f;
                          float used = root["used_weight"] | 0.0f;
                          int pct = (initial > 0.0f) ? (int) ((remaining / initial) * 100.0f + 0.5f) : 0;
                          char combined[160];
                          snprintf(combined, sizeof(combined), "%0*d | %s | %s | %d%%", id(spool_id_width), id(current_spool_id), material, name.c_str(), pct);
                          id(current_spool_text).publish_state(combined);

                          snprintf(combined, sizeof(combined), "%.2feur   |   %.0f/%.0fg   |   %d%% remaining", price, used, initial, pct);

                          id(current_spool_details_text).publish_state(combined);
                          id(spoolman_connected) = true;
                          id(spoolman_status_text).publish_state("connected");
                          if (id(flash_pending_from_nfc)) {
                            id(flash_pending_from_nfc) = false;
                            id(flash_until_ms) = millis() + 3000;
                          }
                          return true;
                        });
                        if (!parsed) {
                          id(spoolman_connected) = false;
                          id(spoolman_status_text).publish_state("json_error");
                        }

  - id: fetch_filament_info_for_view
    mode: restart
    then:
      - if:
          condition:
            lambda: "return id(viewing_spool_id) > 0;"
          then:
            - http_request.get:
                url: !lambda |-
                  return "${spoolman_url_spool_path}" + to_string(id(viewing_spool_id));
                capture_response: true
                on_response:
                  - lambda: |-
                      if (response->status_code != 200) {
                        id(viewing_filament_line_1).publish_state("Spool fetch err");
                        ESP_LOGW("backend", "Spool fetch HTTP %d", response->status_code);
                        return;
                      }
                      bool parsed = json::parse_json(body, [](JsonObject root) -> bool {
                        JsonObject filament = root["filament"];
                        const char *name = filament["name"] | "Unknown";
                        const char *material = filament["material"] | "?";
                        const char *vendor = filament["vendor"]["name"] | "Unknown";
                        int fid = filament["id"] | 0;
                        float initial = root["initial_weight"] | 0.0f;
                        float remaining = root["remaining_weight"] | 0.0f;
                        int pct = (initial > 0.0f) ? (int)((remaining / initial) * 100.0f + 0.5f) : 0;
                        int tex = filament["settings_extruder_temp"] | 0;
                        int tbed = filament["settings_bed_temp"] | 0;
                        id(viewing_filament_id) = fid;

                        char buf[96];

                        snprintf(buf, sizeof(buf), "%s", name);
                        id(viewing_filament_line_1).publish_state(buf);

                        snprintf(buf, sizeof(buf), "%s - %s", material, vendor);
                        id(viewing_filament_line_2).publish_state(buf);

                        id(viewing_remaining_pct) = pct;

                        snprintf(buf, sizeof(buf), "NOZZLE: %dC", tex);
                        id(viewing_filament_line_3).publish_state(buf);

                        snprintf(buf, sizeof(buf), "BED: %dC", tbed);
                        id(viewing_filament_line_4).publish_state(buf);

                        ESP_LOGI("backend", "Filament view updated: spool=%d filament=%d %s/%s",
                                 id(viewing_spool_id), id(viewing_filament_id), name, material);
                        return true;
                      });
                      if (!parsed) {
                        id(viewing_filament_line_1).publish_state("JSON parse err");
                        ESP_LOGW("backend", "Filament view JSON parse failed");
                      }

  - id: change_active_spool
    mode: restart
    then:
      - if:
          condition:
            lambda: "return id(pending_spool_id) <= 0;"
          then:
            - lambda: |-
                ESP_LOGW("guard", "change_active_spool called with pending_spool_id=0");
          else:
            - http_request.get:
                url: ${moonraker_url_print_stats}
                capture_response: true
                on_response:
                  - lambda: |-
                      std::string state = "unknown";
                      if (response->status_code != 200) {
                        ESP_LOGW("guard", "print_stats HTTP %d - allowing spool change anyway",
                                 response->status_code);
                      } else {
                        bool parsed = json::parse_json(body, [&state](JsonObject root) -> bool {
                          const char *s = root["result"]["status"]["print_stats"]["state"] | "unknown";
                          state = s;
                          return true;
                        });
                        if (!parsed) {
                          ESP_LOGW("guard", "print_stats JSON parse failed - allowing spool change");
                          state = "unknown";
                        }
                      }
                      id(printer_state) = state;
                      id(printer_state_text).publish_state(state);

                      bool busy = (state == "printing" || state == "paused");
                      if (busy) {
                        id(change_spool_error_text).publish_state(
                          std::string("Printer ") + state + " - spool not changed");
                        id(error_flash_until_ms) = millis() + 4000;
                        ESP_LOGW("guard", "Refused spool change to %d: printer state=%s",
                                 id(pending_spool_id), state.c_str());
                        id(pending_spool_id) = 0;
                        return;
                      }
                      ESP_LOGI("guard", "Allowed spool change to %d (printer state=%s)",
                               id(pending_spool_id), state.c_str());
                  - script.execute: apply_active_spool

  - id: apply_active_spool
    mode: restart
    then:
      - lambda: |-
          if (id(pending_spool_id) <= 0) return;
          id(current_spool_id) = id(pending_spool_id);
          id(pending_spool_id) = 0;
          id(change_spool_error_text).publish_state("");
      - script.execute: fetch_spool_by_id
      - script.execute: push_active_spool_to_moonraker

  - id: push_active_spool_to_moonraker
    mode: restart
    then:
      - http_request.post:
          url: ${moonraker_url_set_spool}
          request_headers:
            Content-Type: application/json
          body: !lambda |-
            if (id(current_spool_id) > 0) {
              return std::string("{\"spool_id\":") + to_string(id(current_spool_id)) + "}";
            }
            return std::string("{\"spool_id\":null}");
          capture_response: true
          on_response:
            - lambda: |-
                if (response->status_code < 200 || response->status_code >= 300) {
                  ESP_LOGW("moonraker", "Set active spool HTTP %d: %s",
                           response->status_code, body.c_str());
                  return;
                }
                ESP_LOGI("moonraker", "Active spool set to %d in Moonraker",
                         id(current_spool_id));

interval:
  - interval: 60s
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - script.execute: refresh_backend_status

  - interval: 5min
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - script.execute: fetch_spools_list

sensor:
  - platform: wifi_signal
    id: wifi_rssi
    name: "${friendly_name} WiFi RSSI"
    update_interval: 30s
    entity_category: diagnostic
    web_server:
      sorting_group_id: sorting_group_diagnostic
      sorting_weight: 1

  - platform: uptime
    id: uptime_seconds
    name: "${friendly_name} Uptime"
    update_interval: 30s
    entity_category: diagnostic
    web_server:
      sorting_group_id: sorting_group_diagnostic
      sorting_weight: 2

text_sensor:
  - platform: version
    name: "ESPHome Version"
    hide_timestamp: true
    hide_hash: true

  - platform: wifi_info
    ip_address:
      id: wifi_info_ip
      name: "${friendly_name} IP Address"

  - platform: template
    id: moonraker_status_text
    icon: mdi:connection
    name: "${friendly_name} Moonraker Status"
    update_interval: never
    web_server:
      sorting_group_id: sorting_group_status
      sorting_weight: 1

  - platform: template
    id: spoolman_status_text
    icon: mdi:connection
    name: "${friendly_name} Spoolman Status"
    update_interval: never
    web_server:
      sorting_group_id: sorting_group_status
      sorting_weight: 2

  - platform: template
    id: printer_state_text
    name: "${friendly_name} Printer State"
    icon: mdi:printer-3d-nozzle-alert
    update_interval: never
    web_server:
      sorting_group_id: sorting_group_status
      sorting_weight: 3

  - platform: template
    id: current_spool_text
    name: "${friendly_name} Current Spool"
    update_interval: never
    icon: mdi:movie-roll
    web_server:
      sorting_group_id: sorting_group_nfc_read
      sorting_weight: 2

  - platform: template
    id: current_spool_details_text
    name: "${friendly_name} Current Spool Details"
    update_interval: never
    icon: mdi:movie-roll
    web_server:
      sorting_group_id: sorting_group_nfc_read
      sorting_weight: 3

select:
  - platform: template
    id: spool_select
    name: "${friendly_name} Spool Selection"
    icon: mdi:movie-roll
    optimistic: true
    options:
      - "loading"
    initial_option: "loading"
    set_action:
      - lambda: |-
          size_t sep = x.find(" | ");
          std::string id_part = (sep != std::string::npos) ? x.substr(0, sep) : x;
          int selected_id = atoi(id_part.c_str());
          if (selected_id <= 0) {
            ESP_LOGW("spoolman", "Invalid select value: %s", x.c_str());
            return;
          }
          id(pending_spool_id) = selected_id;
          id(change_active_spool).execute();
    web_server:
      sorting_group_id: sorting_group_nfc_read
      sorting_weight: 1

button:
  - platform: restart
    name: "${friendly_name} Restart"
    web_server:
      sorting_group_id: sorting_group_diagnostic

  - platform: template
    name: "${friendly_name} Refresh Moonraker"
    icon: mdi:connection
    on_press:
      then:
        - script.execute: refresh_backend_status
    web_server:
      sorting_group_id: sorting_group_status
      sorting_weight: 4

  - platform: template
    name: "${friendly_name} Refresh Spoolman"
    icon: mdi:connection
    on_press:
      then:
        - script.execute: fetch_spools_list
        - script.execute: fetch_spool_by_id
    web_server:
      sorting_group_id: sorting_group_status
      sorting_weight: 5

